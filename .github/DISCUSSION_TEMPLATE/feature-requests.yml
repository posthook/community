title: "[Feature]: "
labels:
  - "feature-request"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

        **Before posting**, please search existing discussions to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem would this feature solve? What are you trying to do?
      placeholder: I'm trying to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
      placeholder: It would be great if...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternatives?
      placeholder: I've tried...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other details, mockups, examples from other tools, etc.
